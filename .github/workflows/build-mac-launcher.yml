name: Build macOS Launcher

on:
  workflow_run:
    workflows: ["Build Packages"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-mac-launcher:
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: launcher/mac/go.sum
      
      - name: Download release packages
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build-packages.yml
          name: release-packages
          path: release/
          workflow_conclusion: success
      
      - name: Install Task
        run: |
          brew install go-task
      
      - name: List downloaded artifacts
        run: ls -lh release/
      
      - name: Build macOS ARM64 launcher
        run: task build-mac-launcher IMG_ARCH=aarch64
      
      - name: Verify launcher binary
        run: |
          ls -lh release/mac-runner-*
          file release/mac-runner-*
      
      - name: Upload macOS launcher
        uses: actions/upload-artifact@v4
        with:
          name: mac-launcher
          path: release/mac-runner-*
          retention-days: 7
