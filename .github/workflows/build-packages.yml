name: Build Packages

on:
  workflow_dispatch:

jobs:
  build-linux-packages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install curl and Task
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
      
      - name: Install system dependencies
        run: task install-deps
      
      - name: Build all packages
        run: task package
      
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: release/
          retention-days: 7
      
      - name: List generated artifacts
        run: ls -lh release/

  build-mac-launcher:
    runs-on: macos-latest
    needs: build-linux-packages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: launcher/mac/go.sum
      
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: release/
      
      - name: Install Task
        run: |
          brew install go-task
      
      - name: List downloaded artifacts
        run: ls -lh release/
      
      - name: Build macOS ARM64 launcher
        run: task build-mac-launcher IMG_ARCH=aarch64
      
      - name: Test macOS launcher with SSH keys
        run: task test-ssh-keys-mac IMG_ARCH=aarch64
      
      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mac-vm-logs
          path: |
            vm.log
            vm-console.log
            vm-state.json
          if-no-files-found: warn
          retention-days: 7
      
      - name: Verify launcher binary
        run: |
          ls -lh release/mac-runner-*
          file release/mac-runner-*
      
      - name: Upload macOS launcher
        uses: actions/upload-artifact@v4
        with:
          name: mac-launcher
          path: release/mac-runner-*
          retention-days: 7
