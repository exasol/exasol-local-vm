name: Question / Help
description: Ask a question or request help
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the README, existing issues, and relevant documentation.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish?
      placeholder: I'm trying to...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What Have You Tried?
      description: What steps have you already taken?
      placeholder: I've tried...

  - type: dropdown
    id: os
    attributes:
      label: Host Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
        - Not applicable

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other relevant details.
