name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide enough detail for maintainers to reproduce and investigate the problem.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Configure '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Host Operating System
      description: What host OS are you using?
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      description: What architecture is affected?
      options:
        - x86_64 / amd64
        - aarch64 / arm64
        - Other
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Release version, tag, or commit SHA.
      placeholder: e.g., v0.1.0 or abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Runtime, virtualization, container engine, or other relevant environment details.
      placeholder: e.g., Podman version, vfkit version, Hyper-V details, CI runner, local machine

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Any relevant log output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
