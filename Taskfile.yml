version: '3'

tasks:
  install-deps:
    desc: Install host dependencies for building and running the VM with Podman on Linux
    run: once
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y jq podman xz-utils

  build:
    desc: Build kernel, initramfs, raw disk image, and VHDX through the podman builder stages for {{.IMG_ARCH}}
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: build-nano-container
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    cmds:
      - ./host/build/build-artifacts.sh "{{.IMG_ARCH}}"

  build-qemu-container:
    desc: Build the Podman/QEMU runner container image for starting the VM
    run: once
    cmds:
      - podman build --arch "$(uname -m)" -t exasol-nano-vm-runner:latest host/run

  ensure-vm-image:
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    status:
      - test -f output/{{.IMG_ARCH}}/disk.img
      - test -f output/{{.IMG_ARCH}}/disk_thin.img
      - test -f output/{{.IMG_ARCH}}/arch.txt
      - test -f output/{{.IMG_ARCH}}/vmlinuz-virt
      - test -f output/{{.IMG_ARCH}}/initramfs.img.zst
      - test -f output/{{.IMG_ARCH}}/kernel-cmdline.txt
    cmds:
      - task: build
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"

  ensure-qemu-container:
    status:
      - podman image exists exasol-nano-vm-runner:latest
    cmds:
      - task: build-qemu-container

  start-vm:
    desc: Start the VM in a detached Podman runner container
    run: once
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/run/start-qemu-container.sh "{{.IMG_ARCH}}"

  start-vm-attached:
    desc: Start the VM in an attached Podman runner container
    run: once
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/run/start-qemu-container.sh -a "{{.IMG_ARCH}}"

  stop-vm:
    desc: Stop the Podman runner container for the VM
    cmds:
      - ./host/run/stop-qemu-container.sh

  startup-benchmark:
    desc: Benchmark VM startup time (start VM and measure time to SSH)
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/test/startup-benchmark.sh "{{.IMG_ARCH}}"

  test-ssh-keys:
    desc: Test SSH key import feature (requires built VM image)
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/test/test-ssh-keys.sh "{{.IMG_ARCH}}"

  test-container:
    desc: Test container REST server and data persistence (requires running VM with container)
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/test/test-container.sh "{{.IMG_ARCH}}"

  test:
    desc: Run all tests
    cmds:
      - task: startup-benchmark
      - task: test-ssh-keys
      - task: test-container

  build-test-container:
    desc: Build and package the test Podman container for distribution
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    dir: examples/demo-container
    cmds:
      - ./build-packaged-container.sh "{{.IMG_ARCH}}" shared

  build-nano-container:
    desc: Build the Exasol Nano DB container for {{.IMG_ARCH}}
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    cmds:
      - ./nano-container/build.sh "{{.IMG_ARCH}}"

  package-linux:
    desc: Package the VM artifacts and Podman/QEMU runner for Linux users for {{.IMG_ARCH}}
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    cmds:
      - ./host/package/package-linux.sh "{{.IMG_ARCH}}"

  package-mac:
    desc: Package the raw UEFI disk for macOS/vfkit users
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    cmds:
      - ./host/package/package-mac.sh "{{.IMG_ARCH}}"

  package-windows:
    desc: Package the VHDX disk for Windows/Hyper-V users
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    cmds:
      - ./host/package/package-windows.sh "{{.IMG_ARCH}}"

  package:
    desc: Build all distributable packages
    deps:
      - task: package-linux
        vars:
          IMG_ARCH: aarch64
      - task: package-linux
        vars:
          IMG_ARCH: x86_64
      - task: package-mac
        vars:
          IMG_ARCH: aarch64
      - task: package-windows
        vars:
          IMG_ARCH: x86_64

  clean:
    desc: Remove generated files
    cmds:
      - task: stop-vm
      - git clean -Xf .
