version: '3'

tasks:
  install-deps:
    desc: Install host dependencies for building with Podman and running the VM locally on Linux
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y jq ovmf podman qemu-efi-aarch64 qemu-system-aarch64 qemu-system-x86 qemu-utils virtiofsd xz-utils

  build:
    desc: Build kernel, initramfs, raw disk image, and VHDX through the podman builder stages
    cmds:
      - |
        if [ -z "${IMG_ARCH:-}" ]; then
          case "$(uname -m)" in
            x86_64|amd64) export IMG_ARCH=x86_64 ;;
            aarch64|arm64) export IMG_ARCH=aarch64 ;;
            *)
              echo "Error: unsupported host architecture: $(uname -m)" >&2
              echo "Set IMG_ARCH explicitly to x86_64 or aarch64." >&2
              exit 1
              ;;
          esac
        fi
        ./host/build/build-artifacts.sh

  build-qemu-container:
    desc: Build the Podman/QEMU runner container image for starting the VM
    cmds:
      - podman build -f host/run/Containerfile -t exasol-nano-vm-runner:latest .

  ensure-vm-image:
    status:
      - test -f output/disk.img
      - test -f output/arch.txt
      - test -f output/vmlinuz-virt
      - test -f output/initramfs.img.zst
      - test -f output/kernel-cmdline.txt
    cmds:
      - task: build

  ensure-qemu-container:
    status:
      - podman image exists exasol-nano-vm-runner:latest
    cmds:
      - task: build-qemu-container

  start-vm:
    desc: Start the VM in a detached Podman runner container
    deps:
      - ensure-vm-image
      - ensure-qemu-container
    cmds:
      - ./host/run/start-container.sh

  start-vm-attached:
    desc: Start the VM in an attached Podman runner container
    deps:
      - ensure-vm-image
      - ensure-qemu-container
    cmds:
      - ./host/run/start-container.sh --attached

  stop-vm:
    desc: Stop the Podman runner container for the VM
    cmds:
      - ./host/run/stop-container.sh

  package-linux:
    desc: Package the raw UEFI disk for Linux/QEMU users
    deps:
      - build
    cmds:
      - ./host/package/package-linux.sh

  package-mac:
    desc: Package the raw UEFI disk for macOS/vfkit users
    deps:
      - build
    cmds:
      - ./host/package/package-mac.sh

  package-windows:
    desc: Package the VHDX disk for Windows/Hyper-V users
    deps:
      - build
    cmds:
      - ./host/package/package-windows.sh

  package:
    desc: Build all distributable packages
    deps:
      - package-linux
      - package-mac
      - package-windows

  cleanup-force:
    desc: Force kill all QEMU and virtiofsd processes and clean up files
    cmds:
      - task: clean
      - ./host/lib/cleanup-force.sh

  clean:
    desc: Remove generated files
    cmds:
      - task: stop-vm
      - git clean -Xf .
