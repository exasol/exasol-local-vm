version: '3'

vars:
  NANO_BASE_TAG: 2026.2.0-nano.2

tasks:
  lint:
    desc: Run all lint checks
    cmds:
      - task: lint-copyright

  lint-copyright:
    desc: Check configured source files for copyright and SPDX headers
    cmds:
      - python3 tools/copyright_headers.py --check

  fix-copyright:
    desc: Add missing copyright and SPDX headers to configured source files
    cmds:
      - python3 tools/copyright_headers.py --fix

  install-deps:
    desc: Install host dependencies for building and running the VM with Podman on Linux
    run: once
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y jq podman xz-utils qemu-user-static
      - sudo systemctl restart systemd-binfmt

  download-db-container:
    desc: Download database container image to release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    status:
      - test -f release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz
      - test -f release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz.metadata
      - test "$(sed -n 's/^nano_base_tag=//p' release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz.metadata)" = "{{.NANO_BASE_TAG}}"
      - test release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz -nt launcher/assets/download-db-container.sh
    cmds:
      - NANO_BASE_TAG="{{.NANO_BASE_TAG}}" ./launcher/assets/download-db-container.sh "{{.IMG_ARCH}}"

  stage-init-assets:
    desc: Copy database container tarball from release/ to launcher/assets/init for {{.IMG_ARCH}}
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: download-db-container
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    status:
      - test -f launcher/assets/init/exasol-nano-db.tar.gz
      - test -f launcher/assets/init/exasol-nano-db.tar.gz.metadata
      - test launcher/assets/init/exasol-nano-db.tar.gz -nt release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz
      - cmp -s release/exasol-nano-db-{{.IMG_ARCH}}.tar.gz.metadata launcher/assets/init/exasol-nano-db.tar.gz.metadata
    cmds:
      - ./launcher/assets/stage-init-assets.sh "{{.IMG_ARCH}}"

  build:
    desc: Build kernel, initramfs, raw disk image, and VHDX through the podman builder stages for {{.IMG_ARCH}}
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    cmds:
      - ./host/build/build-artifacts.sh "{{.IMG_ARCH}}"

  build-qemu-container:
    desc: Build the Podman/QEMU runner container image for starting the VM
    run: once
    cmds:
      - podman build --arch "$(uname -m)" -t exasol-local-vm-runner:latest host/run

  ensure-vm-image:
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    status:
      - test -f output/{{.IMG_ARCH}}/disk.img
      - test -f output/{{.IMG_ARCH}}/disk_thin.img
      - test -f output/{{.IMG_ARCH}}/arch.txt
      - test -f output/{{.IMG_ARCH}}/vmlinuz-virt
      - test -f output/{{.IMG_ARCH}}/initramfs.img
      - test -f output/{{.IMG_ARCH}}/kernel-cmdline.txt
    cmds:
      - task: build
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"

  ensure-qemu-container:
    status:
      - podman image exists exasol-local-vm-runner:latest
    cmds:
      - task: build-qemu-container

  start-vm:
    desc: Start the VM in a detached Podman runner container
    run: once
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/run/start-qemu-container.sh "{{.IMG_ARCH}}"

  start-vm-attached:
    desc: Start the VM in an attached Podman runner container
    run: once
    requires:
      vars:
        - name: IMG_ARCH
          enum: [x86_64, aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ensure-qemu-container
    cmds:
      - ./host/run/start-qemu-container.sh -a "{{.IMG_ARCH}}"

  stop-vm:
    desc: Stop the Podman runner container for the VM
    cmds:
      - ./host/run/stop-qemu-container.sh

  test-launcher-integration:
    desc: Run launcher integration tests in ./tests
    cmds:
      - cd tests && go test -timeout 30m ./...

  package-mac:
    desc: Package the raw UEFI disk for macOS/vfkit users
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [aarch64]
    deps:
      - task: ensure-vm-image
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
    cmds:
      - ./host/package/package-mac.sh "{{.IMG_ARCH}}"

  build-mac-launcher:
    desc: Build the macOS launcher binary (must be run on macOS)
    run: when_changed
    requires:
      vars:
        - name: IMG_ARCH
          enum: [aarch64, x86_64]
    cmds:
      - task: stage-init-assets
        vars:
          IMG_ARCH: "{{.IMG_ARCH}}"
      - ./host/package/build-mac-launcher.sh "{{.IMG_ARCH}}"

  package:
    desc: Build all distributable packages
    deps:
      - task: package-mac
        vars:
          IMG_ARCH: aarch64

  clean:
    desc: Remove generated files
    cmds:
      - task: stop-vm
      - git clean -Xf .

  ci-build-mac-launcher:
    desc: Run Build Packages workflow on current branch and download macOS launcher
    vars:
      # if you are only changing macOS launcher code, you can skip the vm disk build to speed up the workflow.
      # note: you must have a recent successful vm disk build in the same branch for the workflow to use instead.
      SKIP_LINUX_BUILD: '{{.SKIP_LINUX_BUILD | default "false"}}'
      # If SKIP_LINUX_BUILD is true, you can optionally specify a previous workflow run ID to download the vm disk
      # build artifacts from instead of the latest successful run.
      PREVIOUS_RUN_ID: '{{.PREVIOUS_RUN_ID | default ""}}'
    cmds:
      - |
        {{if eq .SKIP_LINUX_BUILD "true"}}
          {{if ne .PREVIOUS_RUN_ID ""}}
            ./host/github/ci-build-mac-launcher.sh --skip-linux-build --use-run-id {{.PREVIOUS_RUN_ID}}
          {{else}}
            ./host/github/ci-build-mac-launcher.sh --skip-linux-build
          {{end}}
        {{else}}
          ./host/github/ci-build-mac-launcher.sh
        {{end}}
