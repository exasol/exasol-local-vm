version: '3'

tasks:
  install-deps:
    desc: Install host dependencies for building with Podman and running the VM locally on Linux
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y jq ovmf podman qemu-efi-aarch64 qemu-system-aarch64 qemu-system-x86 qemu-utils virtiofsd xz-utils

  build:
    desc: Build kernel, initramfs, raw disk image, and VHDX through the podman builder stages
    cmds:
      - ./host/build/build-artifacts.sh

  start-vm:
    desc: Start the built VM locally with QEMU
    cmds:
      - ./host/run/start-vm.sh

  start-vm-attached:
    desc: Start the built VM locally with QEMU and keep the console attached
    cmds:
      - ./host/run/start-vm.sh --attached

  stop-vm:
    desc: Stop the local QEMU VM
    cmds:
      - ./host/run/stop-vm.sh

  package-linux:
    desc: Package the raw UEFI disk for Linux/QEMU users
    deps:
      - build
    cmds:
      - ./host/package/package-linux.sh

  package-mac:
    desc: Package the raw UEFI disk for macOS/vfkit users
    deps:
      - build
    cmds:
      - ./host/package/package-mac.sh

  package-windows:
    desc: Package the VHDX disk for Windows/Hyper-V users
    deps:
      - build
    cmds:
      - ./host/package/package-windows.sh

  package:
    desc: Build all distributable packages
    deps:
      - package-linux
      - package-mac
      - package-windows

  cleanup-force:
    desc: Force kill all QEMU and virtiofsd processes and clean up files
    cmds:
      - task: clean
      - ./host/lib/cleanup-force.sh

  clean:
    desc: Remove generated files
    cmds:
      - task: stop-vm
      - git clean -Xf .
