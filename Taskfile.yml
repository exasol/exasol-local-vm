version: '3'

tasks:
  install-deps:
    desc: Install QEMU dependencies for both x86_64 and ARM64
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y qemu-system-x86 qemu-system-aarch64 qemu-utils qemu-efi-aarch64 ovmf wget genisoimage parted e2fsprogs bc xz-utils virtiofsd gdisk gh jq

  generate-ssh-key:
    desc: Generate SSH key for VM access
    cmds:
      - ./host/build/generate-ssh-key.sh

  download-image:
    desc: Download Alpine Linux NoCloud image
    vars:
      IMAGE_URL: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-aarch64-uefi-cloudinit-r0.qcow2
      # IMAGE_URL: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-x86_64-uefi-cloudinit-r0.qcow2
    status:
      - test -f image-downloaded.flag
    cmds:
      - ./host/build/download-image.sh {{.IMAGE_URL}}

  expand-disk:
    desc: Expand disk image to 6GB
    deps:
      - download-image
    status:
      - test -f disk-expanded.flag
    cmds:
      - ./host/build/expand-disk.sh

  create-cloud-init:
    desc: Create cloud-init configuration ISO
    deps:
      - generate-ssh-key
    cmds:
      - ./host/build/create-cloud-init.sh

  prepare-db:
    desc: Fetch the exasol-nano linux.run and copy to shared folder
    cmds:
      - task: fetch-linux-run
      - task: copy-linux-run-to-shared

  fetch-linux-run:
    desc: Fetch the exasol-nano linux.run from GitHub releases
    dir: linux-run
    cmds:
      - ./fetch.sh

  copy-linux-run-to-shared:
    deps:
      - fetch-linux-run
    cmds:
      - cp linux-run/dist/db.run shared/db.run
      - cp linux-run/dist/entrypoint.sh shared/entrypoint.sh
      - echo "linux.run and entrypoint.sh copied to shared directory"

  init-vm:
    desc: Initialize and start the Exasol VM (first time setup)
    deps:
      - create-cloud-init
      - prepare-db
    status:
      - test -f vm-initialized.flag
    cmds:
      - task: expand-disk
      - ./host/build/init-vm.sh
      - task: clean-shared

  clean-shared:
    desc: Clean shared folder after initialization
    internal: true
    cmds:
      - ./host/lib/clean-shared.sh

  shrink-disk:
    desc: Shrink disk image to minimum size (run after init-vm)
    status:
      - test -f disk-shrunk.flag
    cmds:
      - sudo ./host/build/shrink-disk.sh

  start-vm:
    desc: Start the Exasol VM
    cmds:
      - ./host/run/start-vm.sh

  start-vm-attached:
    desc: Start the VM with console attached for debugging (Ctrl-A X to exit)
    cmds:
      - ./host/run/start-vm.sh --attached

  stop-vm:
    desc: Stop the Exasol VM
    cmds:
      - ./host/run/stop-vm.sh

  connect:
    desc: Connect to the Exasol VM via SSH
    cmds:
      - ssh -i vm-key -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null exasol@localhost

  startup-benchmark:
    desc: Benchmark VM startup time (start VM and measure time to SSH)
    cmds:
      - ./host/test/startup-benchmark.sh

  test-ssh-keys:
    desc: Test SSH key import feature (requires built VM image)
    cmds:
      - ./host/test/test-ssh-keys.sh

  test:
    desc: Run all tests
    cmds:
      - task: test-ssh-keys

  build:
    desc: Build complete VM image ready for distribution
    cmds:
      - task: init-vm
      - task: shrink-disk
      - task: test

  package-mac:
    desc: Package VM for macOS using vfkit (packages disk image for distribution)
    deps:
      - build
    cmds:
      - ./host/package/package-mac.sh

  package-windows:
    desc: Package VM for Windows Hyper-V (converts disk.img to VHDX format)
    deps:
      - build
    cmds:
      - ./host/package/package-windows.sh

  cleanup-force:
    desc: Force kill all QEMU and virtiofsd processes and clean up files
    cmds:
      - task: clean
      - ./host/lib/cleanup-force.sh

  clean:
    desc: Remove all generated files (disk image, cloud-init ISO, SSH keys, etc.)
    cmds:
      - task: stop-vm
      - git clean -Xf .
      - echo "==> Cleaned all ignored files in buildvm directory"
